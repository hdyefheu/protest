<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Movie Gallery</title>
    <link rel="stylesheet" href="style.css" />

    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        background: #ffffff;
        padding: 20px;
        font-family: sans-serif;
      }

      /* MOBILE FIRST */
      .grid-container {
        display: grid;
        gap: 15px;
        justify-content: center;
        grid-template-columns: 1fr; /* always 1 column on phones */
      }

      .card {
        width: 100%;
        aspect-ratio: 2 / 3; /* keeps poster shape automatically */
        position: relative;
        border-radius: 4px;
        overflow: hidden;
        background-size: cover;
        background-position: center;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
      }

      /* labels */
      .label {
        background: rgba(0, 0, 0, 0.6);
        color: white;
        font-size: 0.8rem;
        padding: 6px;
        text-align: center;
      }

      .year-badge {
        align-self: flex-end;
        margin: 6px;
        border-radius: 3px;
        padding: 3px 8px;
        font-size: 0.75rem;
      }

      .title-bar {
        width: 100%;
        font-weight: bold;
      }

      /* TABLET AND DESKTOP */
      @media (min-width: 600px) {
        .grid-container {
          grid-template-columns: repeat(auto-fit, 150px);
        }

        .card {
          width: 150px; /* fixed poster width */
          aspect-ratio: 2 / 3;
        }
      }
    </style>
  </head>

  <body>
    <div class="grid-container" id="movie-gallery"></div>

    <script>
      async function loadMovies() {
        try {
          const response = await fetch("movies.json");
          const movies = await response.json();

          const container = document.getElementById("movie-gallery");

          movies.forEach((movie) => {
            const card = document.createElement("div");

            card.className = "card";

            card.style.backgroundImage = `url('${movie.image}')`;

            card.innerHTML = `
            <div class="label year-badge">${movie.year}</div>
            <div class="label title-bar">${movie.title}</div>
          `;

            container.appendChild(card);
          });
        } catch (error) {
          console.error(error);
        }
      }

      loadMovies();
    </script>
  </body>
</html>
