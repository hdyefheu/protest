<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Movie Gallery</title>

<style>
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  background: #ffffff;
  padding: 40px;
  font-family: sans-serif;
}

/* GRID */
.grid-container {
  display: grid;
  gap: 15px;
  justify-content: center;
  grid-template-columns: 1fr; /* 1 column mobile */
}

.card {
  width: 100%;
  aspect-ratio: 2 / 3;
  position: relative;
  border-radius: 6px;
  overflow: hidden;
  background-size: cover;
  background-position: center;
  cursor: pointer;
  transition: transform .2s;
}

.card:hover {
  transform: scale(1.03);
}

/* overlays */
.label {
  background: rgba(0,0,0,0.6);
  color: white;
  padding: 6px;
  font-size: .8rem;
}

.year-badge {
  position: absolute;
  top: 6px;
  right: 6px;
  border-radius: 4px;
}

.title-bar {
  position: absolute;
  bottom: 0;
  width: 100%;
  text-align: center;
}

/* SAVE BUTTON */
.save-btn {
  position: absolute;
  top: 6px;
  left: 6px;
  background: rgba(0,0,0,.6);
  color: white;
  border: none;
  border-radius: 50%;
  width: 32px;
  height: 32px;
  cursor: pointer;
  font-size: 16px;
}

.save-btn:hover {
  background: rgba(0,0,0,.9);
}

/* GO TO TOP BUTTON */
#topBtn {
  position: fixed;
  bottom: 25px;
  right: 25px;
  background: black;
  color: white;
  border: none;
  border-radius: 50%;
  width: 45px;
  height: 45px;
  font-size: 20px;
  cursor: pointer;
  display: none;
}

#topBtn:hover {
  background: #333;
}

/* DESKTOP */
@media (min-width:600px){
  .grid-container{
    grid-template-columns: repeat(auto-fit,150px);
  }

  .card{
    width:150px;
  }
}
</style>
</head>

<body>

<div class="grid-container" id="movie-gallery"></div>

<button id="topBtn">↑</button>

<script>
async function loadMovies(){
  const response = await fetch("movies.json");
  const movies = await response.json();
  const container = document.getElementById("movie-gallery");

  movies.forEach(movie=>{
    const card = document.createElement("div");
    card.className="card";
    card.style.backgroundImage=`url('${movie.image}')`;

    // CLICK → detail page
    card.onclick=()=>{
      window.location.href=`test2.html?id=${movie.id}`;
    };

    // SAVE BUTTON
    const saveBtn = document.createElement("button");
    saveBtn.className="save-btn";
    saveBtn.innerHTML="⬇";
    saveBtn.onclick = (e)=>{
      e.stopPropagation(); // prevent detail page
      const link = document.createElement("a");
      link.href = movie.image;
      link.download = movie.title+".jpg";
      link.click();
    };

    card.innerHTML += `
      <div class="label year-badge">${movie.year}</div>
      <div class="label title-bar">${movie.title}</div>
    `;
    card.appendChild(saveBtn);
    container.appendChild(card);
  });
}

loadMovies();

// GO TO TOP BUTTON
const topBtn = document.getElementById("topBtn");

window.onscroll = ()=>{
  if(window.scrollY>400){
    topBtn.style.display="block";
  }else{
    topBtn.style.display="none";
  }
};

topBtn.onclick=()=>{
  window.scrollTo({ top:0, behavior:"smooth" });
};
</script>

</body>
</html>
